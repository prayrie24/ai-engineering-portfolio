name: Stage 0 — CI

on:
  push:
    branches: [main]
    paths:
      - "stage-0-foundations/**"
  pull_request:
    branches: [main]
    paths:
      - "stage-0-foundations/**"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "stage-0-foundations/requirements.txt"

      - name: Install dependencies
        working-directory: stage-0-foundations
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        working-directory: stage-0-foundations
        run: pytest tests/ -v --tb=short

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: stage-0-foundations
        run: docker build -t ai-notes-service:${{ github.sha }} .

      - name: Smoke test container
        working-directory: stage-0-foundations
        run: |
          docker run -d -p 8000:8000 --name test-container ai-notes-service:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8000/health
          docker stop test-container
